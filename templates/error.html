<!DOCTYPE html>
<html>
<head>
    <title>Access Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #fdfaf0; color: #856404; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; border: 1px solid #ffeeba; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { line-height: 1.6; color: #666; }
        .contact { margin-top: 25px; font-size: 0.9em; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⏳</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        
        <div class="contact">
            Need help? Please message your host via the Airbnb app.
        </div>
    </div>
</body>
</html>
